<section class="min-h-screen bg-white flex flex-col items-center justify-center p-6 text-center relative overflow-hidden">
  
  <div class="absolute inset-0 pointer-events-none opacity-20">
    <i class="fa-solid fa-apple-whole absolute top-10 left-30 text-green-300 text-3xl animate-bounce [animation-duration:9s]"></i>
    <i class="fa-solid fa-apple-whole absolute top-80 right-50 text-yellow-300 text-8xl animate-bounce [animation-duration:10s]"></i>
    <i class="fa-solid fa-apple-whole absolute top-60 left-60 text-red-300 text-2xl animate-bounce [animation-duration:4s]"></i>
    <i class="fa-solid fa-carrot absolute top-40 right-50 text-orange-300 text-3xl rotate-45 animate-bounce [animation-duration:2s]"></i>
    <i class="fa-solid fa-carrot absolute top-90 left-20 text-orange-300 text-6xl fa-rotate-270 animate-bounce [animation-duration:6s]"></i>
    <i class="fa-solid fa-lemon absolute top-3/4 left-40 text-yellow-300 text-2xl animate-bounce [animation-duration:5s]"></i>
    <i class="fa-solid fa-leaf absolute bottom-1/3 right-10 text-green-300 text-3xl rotate-60 animate-bounce [animation-duration:4s]"></i>
  </div>

  <div class="max-w-xl w-full z-10">
    <div class="relative inline-block mb-8">
      <div class="bg-green-50/50 w-48 h-48 rounded-[3rem] flex items-center justify-center border-2 border-white shadow-xl shadow-green-50">
        <i class="fa-solid fa-cart-shopping text-green-500 text-7xl"></i>
      </div>
      <div class="absolute -top-4 -right-4 bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center font-black text-lg border-4 border-white shadow-lg animate-pulse">
        404
      </div>
    </div>

    <div class="flex justify-center gap-2 mb-6 text-green-400">
      <div class="w-2 h-2 rounded-full bg-current"></div>
      <div class="w-6 h-3 rounded-full border-2 border-current border-t-transparent -mt-1"></div>
      <div class="w-2 h-2 rounded-full bg-current"></div>
    </div>

    <h1 class="text-4xl md:text-5xl font-black text-slate-900 mb-4 tracking-tight">
      Oops! Nothing Here
    </h1>
    <p class="text-slate-500 text-lg leading-relaxed mb-10 max-w-sm mx-auto">
      Looks like this page went out of stock! Don't worry, there's plenty more fresh content to explore.
    </p>

    <div class="flex flex-wrap items-center justify-center gap-4 mb-16">
      <button routerLink="/home" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 hover:bg-green-700 hover:scale-105 transition-all shadow-xl shadow-green-100">
        <i class="fa-solid fa-house"></i>
        Go to Homepage
      </button>
      
      <button (click)="goBack()" class="bg-white text-slate-700 border border-slate-100 px-8 py-4 rounded-2xl font-bold flex items-center gap-3 hover:bg-slate-50 transition-all shadow-sm">
        <i class="fa-solid fa-arrow-left"></i>
        Go Back
      </button>
    </div>

    <div class="bg-white border border-slate-100 p-6 rounded-[2.5rem] shadow-sm">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Popular Destinations</p>
      <div class="flex flex-wrap justify-center gap-3">
        <a routerLink="/products" class="px-5 py-3 rounded-xl bg-green-50 text-green-700 text-sm font-bold hover:bg-green-100 transition-colors">All Products</a>
        <a routerLink="/categories" class="px-5 py-3 rounded-xl bg-slate-50 text-slate-600 text-sm font-bold hover:bg-slate-100 transition-colors">Categories</a>
        <a routerLink="/deals" class="px-5 py-3 rounded-xl bg-slate-50 text-slate-600 text-sm font-bold hover:bg-slate-100 transition-colors">Today's Deals</a>
        <a routerLink="/contact" class="px-5 py-3 rounded-xl bg-slate-50 text-slate-600 text-sm font-bold hover:bg-slate-100 transition-colors">Contact Us</a>
      </div>
    </div>
  </div>
</section>

<header class="bg-linear-to-r from-[#a855f7] to-[#8b5cf6] py-16 px-4 mb-12">
  <div class="max-w-325 mx-auto">
    <nav class="flex items-center gap-2 text-white/80 text-xs mb-4 font-medium">
      <a routerLink="/" class="hover:underline">Home</a>
      <span>/</span>
      <span class="text-white">Brands</span>
    </nav>

    <div class="flex items-center gap-5">
      <div
        class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md border border-white/10 shadow-xl"
      >
        <i class="fa-solid fa-tags text-white text-3xl"></i>
      </div>
      <div>
        <h1 class="text-4xl font-black text-white tracking-tight">Top Brands</h1>
        <p class="text-white/90 font-medium mt-1">Shop from your favorite brands</p>
      </div>
    </div>
  </div>
</header>
<main class="max-w-325 mx-auto px-4 pb-24">
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
    @for (brand of brandsList(); track brand._id) {
      <div
        [routerLink]="['/Products/brand', brand._id]"
        class="group cursor-pointer bg-white rounded-2xl border border-gray-100 p-4 sm:p-5 shadow-sm hover:shadow-2xl hover:border-violet-400 transition-all duration-500 hover:-translate-y-2"
      >
        <div class="aspect-square rounded-xl overflow-hidden bg-gray-50 mb-3 p-4 flex items-center justify-center">
          <img
            [alt]="brand.name"
            [src]="brand.image"
            class="w-full h-full object-contain transition-transform duration-500 group-hover:scale-110"
          />
        </div>

        <h3 class="font-bold text-gray-900 text-center text-sm truncate transition-colors duration-300 group-hover:text-violet-600">
          {{ brand.name }}
        </h3>

        <div class="flex justify-center mt-2 opacity-0 translate-y-2 transition-all duration-300 group-hover:opacity-100 group-hover:translate-y-0">
          <span class="text-2xs font-black text-violet-600 flex items-center gap-1 uppercase tracking-tight">
            View Products
            <i class="fa-solid fa-arrow-right"></i>
          </span>
        </div>
      </div>
    }
  </div>
</main>


@if (isLoading()) {
  <app-loading></app-loading>
}

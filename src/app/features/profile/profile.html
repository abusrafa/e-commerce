<header class="bg-[#22c55e] py-10 px-4 mb-8">
  <div class="max-w-325 mx-auto">

      <nav class="flex items-center gap-2 text-white/80 text-xs mb-4 font-medium">
        <a routerLink="/" class="hover:underline">Home</a>
        <span>/</span>
        <span class="text-white">My Account</span>
      </nav>

      <div class="flex items-center gap-4">
        <div class="w-13 h-13 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm border border-white/10 shadow-xl">
          <i class="fa-solid fa-user text-white text-2xl"></i>
        </div>
        <div>
          <h1 class="text-3xl font-bold text-white tracking-tight">My Account</h1>
          <p class="text-white/70 text-[13px] font-medium">
            Manage your addresses and account settings
          </p>
        </div>
      </div>
  </div>
</header>
<section class="max-w-325 mx-auto">
  <div class=" mx-auto grid grid-cols-1 md:grid-cols-12 gap-8">
    
    <div class="md:col-span-4 lg:col-span-3">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3">
        <h2 class="text-[16px] font-bold text-gray-900 mb-3 p-2 border-b border-gray-200">My Account</h2>
        
         <div class="space-y-1">
    
    <a routerLink="/profile/addresses" 
       #rlaAddr="routerLinkActive"
       routerLinkActive="bg-green-50" 
       class="flex items-center justify-between p-2 rounded-xl cursor-pointer transition-all group hover:bg-gray-50">
      
      <div class="flex items-center gap-3">
        <div [class]="rlaAddr.isActive ? 
             'w-9 h-9 bg-[#198754] rounded-xl flex items-center justify-center shadow-md shadow-green-100' : 
             'w-9 h-9 bg-gray-100 rounded-xl flex items-center justify-center text-gray-400'">
          <i class="fa-solid fa-location-dot text-[14px]" [class.text-white]="rlaAddr.isActive"></i>
        </div>
        
        <span class="font-medium text-[15px] transition-colors" 
              [class]="rlaAddr.isActive ? 'text-[#198754]' : 'text-gray-700'">
          My Addresses
        </span>
      </div>
      
      <i class="fa-solid fa-chevron-right text-2xs transition-transform group-hover:translate-x-0.5"
         [class]="rlaAddr.isActive ? 'text-[#198754]' : 'text-gray-300'"></i>
    </a>

    <a routerLink="/profile/settings" 
       #rlaSett="routerLinkActive"
       routerLinkActive="bg-green-50" 
       class="flex items-center justify-between p-2 rounded-xl cursor-pointer transition-all group hover:bg-gray-50">
      
      <div class="flex items-center gap-3">
        <div [class]="rlaSett.isActive ? 
             'w-9 h-9 bg-[#198754] rounded-xl flex items-center justify-center shadow-md shadow-green-100' : 
             'w-9 h-9 bg-gray-100 rounded-xl flex items-center justify-center text-gray-400'">
          <i class="fa-solid fa-gear text-[14px]" [class.text-white]="rlaSett.isActive"></i>
        </div>
        
        <span class="font-medium text-[15px] transition-colors" 
              [class]="rlaSett.isActive ? 'text-[#198754]' : 'text-gray-700'">
          Settings
        </span>
      </div>
      
      <i class="fa-solid fa-chevron-right text-2xs transition-transform group-hover:translate-x-0.5"
         [class]="rlaSett.isActive ? 'text-[#198754]' : 'text-gray-300'"></i>
    </a>

  </div>
      </div>
    </div>


    <div class="md:col-span-8 lg:col-span-9">
        <router-outlet></router-outlet>
    </div>

  </div>
</section>

<div class="p-6 max-w-4xl">
  <div class="mb-8">
    <h2 class="text-2xl font-bold text-[#001e2b]">Account Settings</h2>
    <p class="text-gray-500 text-sm mt-1">Update your profile information and change your password</p>
  </div>

  <div class="space-y-8">
    
    <div class="bg-white border border-gray-100 rounded-4xl p-8 shadow-sm">
      <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center text-[#198754]">
          <i class="fa-solid fa-user text-xl"></i>
        </div>
        <div>
          <h3 class="font-bold text-[#001e2b] text-lg">Profile Information</h3>
          <p class="text-gray-400 text-xs">Update your personal details</p>
        </div>
      </div>

      <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="space-y-6">
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">Full Name</label>
          <input formControlName="fullName" type="text" placeholder="Enter your full name" title="Full Name" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-[#198754] transition-all">
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">Email Address</label>
          <input formControlName="email" type="email" placeholder="Enter your email" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-[#198754] transition-all">
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">Phone Number</label>
          <input formControlName="phone" type="text" placeholder="01xxxxxxxxx" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-[#198754] transition-all">
        </div>

        <button type="submit" class="bg-[#198754] text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-green-100 active:scale-95 transition-all">
          <i class="fa-solid fa-save"></i> Save Changes
        </button>
      </form>

      <div class="mt-10 pt-8 border-t border-gray-50 space-y-4">
        <h4 class="font-bold text-[#001e2b] text-sm mb-4">Account Information</h4>
        <div class="flex justify-between items-center text-sm">
          <span class="text-gray-500">User ID</span>
          <span class="font-mono text-gray-400 text-xs">69cedde37d358ce90f3d4a50</span>
        </div>
        <div class="flex justify-between items-center text-sm">
          <span class="text-gray-500">Role</span>
          <span class="bg-green-50 text-[#198754] px-3 py-1 rounded-lg text-xs font-bold">User</span>
        </div>
      </div>
    </div>

    <div class="bg-white border border-gray-100 rounded-4xl p-8 shadow-sm">
      <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 bg-orange-50 rounded-xl flex items-center justify-center text-orange-500">
          <i class="fa-solid fa-lock text-xl"></i>
        </div>
        <div>
          <h3 class="font-bold text-[#001e2b] text-lg">Change Password</h3>
          <p class="text-gray-400 text-xs">Update your account password</p>
        </div>
      </div>

      <form [formGroup]="passwordForm" (ngSubmit)="changePassword()" class="space-y-6">
        <div class="relative space-y-2">
          <label class="block text-sm font-medium text-gray-700">Current Password</label>
          <input formControlName="currentPassword" type="password" placeholder="Enter your current password" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-orange-500 transition-all">
          <i class="fa-solid fa-eye text-gray-400 absolute right-4 bottom-4 cursor-pointer text-xs"></i>
        </div>

        <div class="relative space-y-2">
          <label class="block text-sm font-medium text-gray-700">New Password</label>
          <input formControlName="newPassword" type="password" placeholder="Enter your new password" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-orange-500 transition-all">
          <i class="fa-solid fa-eye text-gray-400 absolute right-4 bottom-8 cursor-pointer text-xs"></i>
          <p class="text-2xs text-gray-400 mt-1">Must be at least 6 characters</p>
        </div>

        <div class="relative space-y-2">
          <label class="block text-sm font-medium text-gray-700">Confirm New Password</label>
          <input formControlName="confirmPassword" type="password" placeholder="Confirm your new password" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-orange-500 transition-all">
          <i class="fa-solid fa-eye text-gray-400 absolute right-4 bottom-4 cursor-pointer text-xs"></i>
        </div>

        <button type="submit" class="bg-orange-500 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-orange-100 active:scale-95 transition-all">
          <i class="fa-solid fa-lock"></i> Change Password
        </button>
      </form>
    </div>

  </div>
</div>

@if (isLoading()) {
  <app-loading></app-loading>
}
